# nginx reverse proxy for the Fiber API.
# Drop into your nginx (e.g. /etc/nginx/sites-available/ + symlink, or conf.d/),
# then: get a cert, `nginx -t`, `systemctl reload nginx`.
#
# Cert (one-time, certbot with the nginx plugin):
#   certbot --nginx -d api.shopbyfiber.com
# (certbot will fill in the ssl_* lines + the :80 redirect for you; the manual
#  blocks below are here in case you manage certs yourself.)

server {
    listen 80;
    listen [::]:80;
    server_name api.shopbyfiber.com;

    # Let certbot/webroot answer ACME challenges, redirect everything else.
    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name api.shopbyfiber.com;

    ssl_certificate     /etc/letsencrypt/live/api.shopbyfiber.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.shopbyfiber.com/privkey.pem;

    # Small JSON API — modest limits.
    client_max_body_size 1m;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # CORS is handled by the FastAPI app (allows shopbyfiber.com origins) —
    # do NOT also add CORS headers here or browsers will see duplicates.
}
